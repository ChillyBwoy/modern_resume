services:
  db:
    image: postgres:16.1-alpine
    container_name: modern_resume_dev_db
    env_file: ".env"
    ports:
      - ${DB_PORT}:5432
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_PORT: ${DB_PORT}
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
