name: Docker Image CI for ghcr.io

on:
  release:
    types:
      [published]

jobs:
  build_and_publish:
    runs-on: ubuntu-24.04
    environment: prod
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/chillybwoy/modern_resume:latest
          build-args: |
            TZ=${{ env.TZ }}
            PHX_PORT=${{ env.PHX_PORT }}
            PHX_HOST=${{ env.PHX_HOST }}
            SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            AUTH_GITHUB_CLIENT_ID=${{ secrets.AUTH_GITHUB_CLIENT_ID }}
            AUTH_GITHUB_CLIENT_SECRET=${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}
            AUTH_GOOGLE_CLIENT_ID=${{ secrets.AUTH_GOOGLE_CLIENT_ID }}
            AUTH_GOOGLE_CLIENT_SECRET=${{ secrets.AUTH_GOOGLE_CLIENT_SECRET }}
