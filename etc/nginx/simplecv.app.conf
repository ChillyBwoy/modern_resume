server {
    listen 443 ssl;
    server_name simplecv.app;

    ssl_certificate /etc/letsencrypt/live/simplecv.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/simplecv.app/privkey.pem;

    location / {
        proxy_pass http://localhost:4001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        auth_basic "You shall not pass!";
        auth_basic_user_file /etc/nginx/htpasswd/simplecv.app.htpasswd;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name simplecv.app;
    return 301 https://$host$request_uri;
}
